# configure frontend service

apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: todo-app
spec:
  type: NodePort              # fixed: type must be declared when using nodePort
  selector:
    app: frontend-deployment
  ports:                      # fixed: was "port" (singular) — must be "ports" (plural)
    - port: 80
      targetPort: 80
      nodePort: 30080

# nodePort opens port 30080 on every node so you can access the app from outside
