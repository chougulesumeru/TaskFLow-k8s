# configure backend deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: todo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-deployment
  template:
    metadata:
      labels:
        app: backend-deployment
    spec:
      containers:
        - name: backend
          image: sumeruc/todo-backend:v1
          ports:
            - containerPort: 5000
          envFrom:                        # fixed: was "env: valueFrom: configMapRef" — wrong structure; envFrom is correct for loading all keys from a ConfigMap
            - configMapRef:
                name: app-config
          livenessProbe:                  # fixed: was "livelinessProbe" (typo — correct field is livenessProbe)
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /health              # fixed: was "/heath" (typo)
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

#  3 replicas always maintained even if pod crashes or traffic spikes
# liveness probe restarts stuck pods.
# readiness probe stops traffic until pod is truly ready.
# resources prevent excess usage.
