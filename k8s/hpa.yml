# HPA :- auto scaling under load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: todo-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment

  minReplicas: 3
  maxReplicas: 10
  metrics:                    # fixed: was "metrices" (typo — correct field is "metrics")
    - type: Resource          # fixed: was "types: Resources" — correct is "type" (singular) with value "Resource"
      resource:
        name: cpu             # fixed: was "- name: cpu" inside a list — resource is an object, not a list
        target:
          type: Utilization
          averageUtilization: 70
