# HPA :- auto scaling under load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: todo-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment

  minReplicas: 3
  maxReplicas: 10
  metrices:
    - types: Resources
      resource:
        - name: cpu
          target:
            type: Utilization
            averageUtilization: 70
