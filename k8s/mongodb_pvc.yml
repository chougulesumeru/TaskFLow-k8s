# persistent volume claim :- PVC (storage)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: todo-app
spec:
  accessModes:              # fixed: was "accessMode" (must be plural)
    - ReadWriteOnce         # fixed: "ReadWriteOnly" is not valid, correct value is "ReadWriteOnce"
  resources:
    requests:
      storage: 1Gi

# PVC :- reserves 1GB storage room that survives pod restarts.
